<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js quiz| sign up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="sign-up card shadow p-4" style="width: 100%; max-width: 400px;">
        
        <h3 class="text-center mb-4">Create Account</h3>

        <form>
            <input type="text" id="signName" class="mb-3" placeholder="Username" required>

            <input type="email" id="signEmail" class="mb-3" placeholder="Email" required>

            <input type="password" id="signPassword" class=" mb-3" placeholder="Password" required>

            <button type="button" onclick="signup()" class="btn btn-success w-100 mb-2">
                Sign Up
            </button>
        </form>

        <p class="text-center mt-2">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>

</html>
